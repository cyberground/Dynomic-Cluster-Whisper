events {
    worker_connections 128;
}

http {
    upstream whisper_api {
        server api:8000;
    }

    server {
        listen 80;

        # Grosse Audiodateien erlauben (max 2 GB)
        client_max_body_size 2G;

        # Lange Timeouts fuer Upload + Processing
        client_body_timeout 1800s;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;

        # Temp-Verzeichnis fuer grosse Uploads
        client_body_temp_path /tmp/nginx_uploads;

        location / {
            proxy_pass http://whisper_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health-Check (kein Proxy-Log-Spam)
        location /health {
            proxy_pass http://whisper_api;
            access_log off;
        }
    }
}
