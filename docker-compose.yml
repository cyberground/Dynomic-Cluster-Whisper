  worker_1:
    build: ./worker
    restart: always
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ASR_MODEL=base
      - WORKER_ID=worker_1
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - shared_audio:/tmp/whisper-jobs
    deploy:
      resources:
        limits:
          memory: 1G

  worker_2:
    build: ./worker
    restart: always
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ASR_MODEL=base
      - WORKER_ID=worker_2
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - shared_audio:/tmp/whisper-jobs
    deploy:
      resources:
        limits:
          memory: 1G
